spring:
  application:
    name: KtClaw

  # R2DBC Configuration
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:ktclaw}
    username: ${DB_USER:ktclaw}
    password: ${DB_PASSWORD:}
    pool:
      initial-size: 10
      max-size: 50
      max-idle-time: 30m
      max-acquire-time: 30s

  # Flyway Configuration
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ktclaw}
    user: ${DB_USER:ktclaw}
    password: ${DB_PASSWORD:}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# Server Configuration
server:
  port: 8080

# Logging
logging:
  level:
    org.springframework.data.r2dbc: DEBUG
    org.flywaydb: INFO
    ktclaw.db: DEBUG

# KtClaw Specific Configuration
ktclaw:
  database:
    message-retention-days: 90
    session-timeout-minutes: 30
    max-context-messages: 20
    batch-size: 1000

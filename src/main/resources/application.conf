# KtClaw Application Configuration
# Supports: HOCON, YAML, TOML, JSON formats

ktor {
    deployment {
        port = 8080
        port = ${?KTOR_PORT}
        host = "0.0.0.0"
        host = ${?KTOR_HOST}
        watch = [ "classes" ]
    }
    
    application {
        modules = [ ktclaw.ApplicationKt.module ]
    }
}

# Database Configuration
database {
    driver = "org.postgresql.Driver"
    url = "jdbc:postgresql://localhost:5432/ktclaw"
    url = ${?DATABASE_URL}
    user = "ktclaw"
    user = ${?DATABASE_USER}
    password = "password"
    password = ${?DATABASE_PASSWORD}
    
    # Connection Pool
    pool {
        maxSize = 10
        minIdle = 2
        connectionTimeout = 30000
        idleTimeout = 600000
        maxLifetime = 1800000
    }
}

# WebSocket Configuration
websocket {
    pingPeriodMillis = 15000
    timeoutMillis = 15000
    maxFrameSize = 65536
    masking = false
}

# Logging Configuration
logging {
    level = "INFO"
    level = ${?LOG_LEVEL}
}

# Security Configuration
security {
    jwt {
        secret = "your-secret-key-change-in-production"
        secret = ${?JWT_SECRET}
        issuer = "ktclaw"
        audience = "ktclaw-api"
        realm = "KtClaw API"
        expiration = 86400000  # 24 hours in milliseconds
    }
}

# Feature Flags
features {
    websockets = true
    authentication = true
    rateLimiting = true
}

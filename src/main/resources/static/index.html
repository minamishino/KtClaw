<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KtClaw 管理系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #212529;
        }
        .main-content {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
        .log-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            font-family: monospace;
            font-size: 13px;
        }
        .log-info { color: #0d6efd; }
        .log-warning { color: #ffc107; }
        .log-error { color: #dc3545; }
        .log-success { color: #198754; }
        .log-time {
            color: #6c757d;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <h5 class="sidebar-heading text-white mb-3 px-3">KtClaw</h5>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link active text-white" href="#dashboard">
                                📊 仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white-50" href="#logs">
                                📝 系统日志
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white-50" href="#settings">
                                ⚙️ 系统设置
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- 主内容区 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <!-- 顶部导航 -->
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">仪表盘</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <div class="btn-group me-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary" data-action="ajax-get" data-url="/api/refresh">
                                刷新数据
                            </button>
                            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="ktclawDashboard.exportChartData('resource')">
                                导出数据
                            </button>
                        </div>
                        <span id="system-status" class="badge bg-success">在线</span>
                    </div>
                </div>

                <!-- 提示消息容器 -->
                <div id="alert-container" class="mb-3"></div>

                <!-- 统计卡片 -->
                <div class="row mb-4">
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">总请求数</h6>
                                <h3 class="card-text" id="total-requests">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">活跃用户</h6>
                                <h3 class="card-text" id="active-users">0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">运行时间</h6>
                                <h3 class="card-text" id="uptime">0分钟</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card">
                            <div class="card-body">
                                <h6 class="card-title text-muted">错误率</h6>
                                <h3 class="card-text" id="error-rate">0.00%</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 图表行 -->
                <div class="row mb-4">
                    <div class="col-md-8">
                        <div class="card">
                            <div class="card-header">
                                <h5>系统资源监控</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="resource-chart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-header">
                                <h5>状态分布</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="status-chart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>请求类型分布</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="request-chart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>响应时间</h5>
                            </div>
                            <div class="card-body">
                                <div class="chart-container">
                                    <canvas id="response-time-chart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 表单示例 -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>表单验证示例</h5>
                            </div>
                            <div class="card-body">
                                <form data-ajax="true" data-reset="true" action="/api/test/submit" method="POST">
                                    <div class="mb-3">
                                        <label for="name" class="form-label">姓名</label>
                                        <input type="text" class="form-control" id="name" name="name" 
                                               data-validate="required" 
                                               data-required-message="姓名不能为空">
                                    </div>
                                    <div class="mb-3">
                                        <label for="email" class="form-label">邮箱</label>
                                        <input type="email" class="form-control" id="email" name="email" 
                                               data-validate="required|email" 
                                               data-required-message="邮箱不能为空"
                                               data-email-message="邮箱格式不正确">
                                    </div>
                                    <div class="mb-3">
                                        <label for="age" class="form-label">年龄</label>
                                        <input type="number" class="form-control" id="age" name="age" 
                                               data-validate="required|number" 
                                               data-required-message="年龄不能为空"
                                               data-number-message="年龄必须是数字">
                                    </div>
                                    <button type="submit" class="btn btn-primary">提交</button>
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">
                                <h5>系统操作</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-grid gap-2">
                                    <button class="btn btn-success" data-action="send-ws" data-ws-type="command" data-ws-data='{"action":"start"}'>
                                        ▶️ 启动服务
                                    </button>
                                    <button class="btn btn-warning" data-action="send-ws" data-ws-type="command" data-ws-data='{"action":"restart"}'>
                                        🔄 重启服务
                                    </button>
                                    <button class="btn btn-danger" data-action="send-ws" data-ws-type="command" data-ws-data='{"action":"stop"}' data-confirm="确定要停止服务吗？">
                                        ⏹️ 停止服务
                                    </button>
                                    <button class="btn btn-info" data-action="ajax-get" data-url="/api/system/info">
                                        ℹ️ 获取系统信息
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 日志区域 -->
                <div class="row mb-4">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5>实时日志</h5>
                                <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('message-container').innerHTML = ''">
                                    清空日志
                                </button>
                            </div>
                            <div class="card-body">
                                <div id="message-container" style="max-height: 400px; overflow-y: auto;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自定义JS -->
    <script src="/js/app.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
